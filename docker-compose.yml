version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: itv_mongodb
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: itv_backend
    restart: always
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/interplanetary_tv
      - STRIPE_SECRET_KEY=your_live_stripe_secret_key
      - STRIPE_WEBHOOK_SECRET=your_live_stripe_webhook_secret
      - SVP_API_KEY=your_svp_api_key
      - SVP_API_CODE=your_svp_api_code
      - FRONTEND_URL=https://interplanetary.tv

  nginx:
    image: nginx:alpine
    container_name: itv_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html/web:ro
      - ./cms/dist:/usr/share/nginx/html/cms:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: itv_filebrowser
    restart: always
    user: "0:0"
    command: -c "" -b /filemanager -d /database/filebrowser.db
    volumes:
      - /opt/itv-deploy:/srv
      - uploads_data:/srv/backend/uploads
      - ./filebrowser_data:/database
    depends_on:
      - nginx

volumes:
  mongo_data:
  uploads_data:
