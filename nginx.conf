# Redirect HTTP to HTTPS and non-www to www for main site
server {
    listen 80;
    server_name interplanetary.tv;
    return 301 https://www.interplanetary.tv$request_uri;
}

server {
    listen 80;
    server_name www.interplanetary.tv admin.interplanetary.tv api.interplanetary.tv;
    return 301 https://$host$request_uri;
}

# Redirect https://interplanetary.tv to https://www.interplanetary.tv
server {
    listen 443 ssl http2;
    server_name interplanetary.tv;

    ssl_certificate /etc/letsencrypt/live/www.interplanetary.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.interplanetary.tv/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://www.interplanetary.tv$request_uri;
}

# Main Website (www.interplanetary.tv)
server {
    listen 443 ssl http2;
    server_name www.interplanetary.tv;

    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/www.interplanetary.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.interplanetary.tv/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    root /usr/share/nginx/html/web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ^~ /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# CMS (admin.interplanetary.tv)
server {
    listen 443 ssl http2;
    server_name admin.interplanetary.tv;

    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/www.interplanetary.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.interplanetary.tv/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    location ^~ /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /filemanager/ {
        proxy_pass http://filebrowser:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    root /usr/share/nginx/html/cms;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|svg|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

