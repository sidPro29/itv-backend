# Subdomain: citizens.interplanetary.tv (HTTPS)
server {
    listen 443 ssl http2;
    server_name citizens.interplanetary.tv;

    ssl_certificate /etc/letsencrypt/live/citizens.interplanetary.tv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/citizens.interplanetary.tv/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html/subdomains/citizens;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Dynamic HTTP Subdomain Routing (e.g., citizen.interplanetary.tv)
server {
    listen 80;
    server_name ~^(?<subdomain>(?!www$|admin$|api$)[a-zA-Z0-9-]+)\.interplanetary\.tv$;

    root /usr/share/nginx/html/subdomains/$subdomain;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
